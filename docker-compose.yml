version: "3.9"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: euautos
      POSTGRES_USER: euautos
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U euautos"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://euautos:dev_password@db:5432/euautos
      DATABASE_URL_SYNC: postgresql://euautos:dev_password@db:5432/euautos
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000

  scraper:
    build: ./scraper
    environment:
      DATABASE_URL_SYNC: postgresql://euautos:dev_password@db:5432/euautos
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./scraper:/app

volumes:
  pgdata:
